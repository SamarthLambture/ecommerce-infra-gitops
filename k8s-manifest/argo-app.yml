# argo-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-store-gitops
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io 
spec:
  project: default
  source:
    repoURL: 'https://github.com/SamarthLambture/ecommerce-infra-gitops.git'
    targetRevision: HEAD
    path: k8s-manifest
  destination:
    server: 'https://kubernetes.default.svc' 
    namespace: ecommerce-app-ns             
  syncPolicy:
    automated:
      prune: true    
      selfHeal: true 
    syncOptions:
      - CreateNamespace=true 