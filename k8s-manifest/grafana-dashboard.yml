# grafana-dashboard.yml
# Drop this in k8s-manifest/ — ArgoCD applies it, Grafana sidecar picks it up automatically.
# The label "grafana_dashboard: '1'" is the trigger for Grafana's sidecar to load it.

apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-grafana-dashboard
  namespace: ecommerce-app-ns
  labels:
    grafana_dashboard: "1"            # Grafana sidecar watches for this exact label
data:
  ecommerce-dashboard.json: |
    {
      "title": "Ecommerce App — Full Stack",
      "uid": "ecommerce-main",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "tags": ["ecommerce", "keda", "sqs"],
      "panels": [

        {
          "id": 1,
          "title": "🟢 Pod Status — All Ecommerce Pods",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{"color":"red","value":0},{"color":"green","value":1}] },
              "mappings": []
            }
          },
          "targets": [{
            "expr": "count(kube_pod_status_phase{namespace='ecommerce-app-ns', phase='Running'})",
            "legendFormat": "Running Pods",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 2,
          "title": "📦 Backend Replicas (KEDA Controlled)",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "area" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{"color":"blue","value":0},{"color":"green","value":1}] }
            }
          },
          "targets": [{
            "expr": "kube_deployment_status_replicas_ready{namespace='ecommerce-app-ns', deployment='ecommerce-app-backend-deployment'}",
            "legendFormat": "Ready Replicas",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 3,
          "title": "📬 SQS Queue Depth (orders-queue)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "area" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "steps": [{"color":"green","value":0},{"color":"yellow","value":10},{"color":"red","value":50}] }
            }
          },
          "targets": [{
            "expr": "keda_scaler_metrics_value{scaledObject='order-service-scaler'}",
            "legendFormat": "Messages in Queue",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 4,
          "title": "🔄 ArgoCD Sync Status",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{"color":"red","value":0},{"color":"green","value":1}] },
              "mappings": [{"type":"value","options":{"1":{"text":"Synced","color":"green"},"0":{"text":"Out of Sync","color":"red"}}}]
            }
          },
          "targets": [{
            "expr": "argocd_app_info{name='ecommerce-store-gitops', sync_status='Synced'}",
            "legendFormat": "Sync",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 5,
          "title": "📈 Backend Replicas Over Time (KEDA Scale Events)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "palette-classic" } }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_ready{namespace='ecommerce-app-ns', deployment='ecommerce-app-backend-deployment'}",
              "legendFormat": "Backend Ready",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "kube_deployment_spec_replicas{namespace='ecommerce-app-ns', deployment='ecommerce-app-backend-deployment'}",
              "legendFormat": "Backend Desired",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ]
        },

        {
          "id": 6,
          "title": "📊 SQS Queue Depth Over Time",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "palette-classic" } }
          },
          "targets": [{
            "expr": "keda_scaler_metrics_value{scaledObject='order-service-scaler'}",
            "legendFormat": "SQS Messages",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 7,
          "title": "💻 CPU Usage — All Ecommerce Pods",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "color": { "mode": "palette-classic" } }
          },
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='ecommerce-app-ns', container!=''}[2m])) by (pod)",
            "legendFormat": "{{ pod }}",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 8,
          "title": "🧠 Memory Usage — All Ecommerce Pods",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "palette-classic" } }
          },
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{namespace='ecommerce-app-ns', container!=''}) by (pod)",
            "legendFormat": "{{ pod }}",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 9,
          "title": "🚀 Pod Restarts (Crash Detection)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 6 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "steps": [{"color":"green","value":0},{"color":"red","value":1}] }
            }
          },
          "targets": [{
            "expr": "increase(kube_pod_container_status_restarts_total{namespace='ecommerce-app-ns'}[15m])",
            "legendFormat": "{{ pod }} / {{ container }}",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 10,
          "title": "⚖️ Node CPU vs Memory Pressure",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 6 },
          "fieldConfig": {
            "defaults": { "unit": "percentunit" }
          },
          "targets": [
            {
              "expr": "1 - avg(rate(node_cpu_seconds_total{mode='idle'}[2m]))",
              "legendFormat": "CPU Used %",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)",
              "legendFormat": "Memory Used %",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ]
        }

      ]
    }