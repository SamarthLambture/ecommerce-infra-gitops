# grafana-dashboard.yml
# Replace your existing grafana-dashboard.yml in k8s-manifest/

apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-grafana-dashboard
  namespace: ecommerce-app-ns
  labels:
    grafana_dashboard: "1"
data:
  ecommerce-dashboard.json: |
    {
      "title": "Ecommerce App — Full Stack",
      "uid": "ecommerce-main",
      "schemaVersion": 38,
      "version": 2,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "tags": ["ecommerce", "keda", "sqs", "argocd"],
      "panels": [

        {
          "id": 1,
          "title": "🟢 Running Pods",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{"color":"red","value":0},{"color":"yellow","value":2},{"color":"green","value":3}] }
            }
          },
          "targets": [{
            "expr": "count(kube_pod_status_phase{namespace='ecommerce-app-ns', phase='Running'})",
            "legendFormat": "Running",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 2,
          "title": "📦 Backend Replicas (KEDA)",
          "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "area" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{"color":"blue","value":0},{"color":"green","value":1}] }
            }
          },
          "targets": [{
            "expr": "kube_deployment_status_replicas_ready{namespace='ecommerce-app-ns', deployment='ecommerce-app-backend-deployment'}",
            "legendFormat": "Ready",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 3,
          "title": "📬 SQS Messages (orders-queue)",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "area" },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": { "steps": [{"color":"green","value":0},{"color":"yellow","value":10},{"color":"red","value":50}] }
            }
          },
          "targets": [{
            "expr": "keda_scaler_metrics_value{scaledObject='order-service-scaler'}",
            "legendFormat": "Queue Depth",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 4,
          "title": "✅ ArgoCD Sync Status",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{"color":"red","value":0},{"color":"green","value":1}] },
              "mappings": [{"type":"value","options":{"1":{"text":"Synced","color":"green"},"0":{"text":"OutOfSync","color":"red"}}}]
            }
          },
          "targets": [{
            "expr": "argocd_app_info{name='ecommerce-store-gitops', sync_status='Synced'}",
            "legendFormat": "Sync",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 5,
          "title": "💚 ArgoCD App Health",
          "type": "stat",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{"color":"red","value":0},{"color":"green","value":1}] },
              "mappings": [{"type":"value","options":{"1":{"text":"Healthy","color":"green"},"0":{"text":"Degraded","color":"red"}}}]
            }
          },
          "targets": [{
            "expr": "argocd_app_info{name='ecommerce-store-gitops', health_status='Healthy'}",
            "legendFormat": "Health",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 6,
          "title": "🌐 EKS Ready Nodes",
          "type": "stat",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{"color":"red","value":0},{"color":"green","value":1}] }
            }
          },
          "targets": [{
            "expr": "count(kube_node_status_condition{condition='Ready', status='true'})",
            "legendFormat": "Ready Nodes",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 7,
          "title": "📈 KEDA Scale Events — Replicas vs Queue Depth",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "palette-classic" }, "min": 0 }
          },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_ready{namespace='ecommerce-app-ns', deployment='ecommerce-app-backend-deployment'}",
              "legendFormat": "Backend Ready Replicas",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "kube_deployment_spec_replicas{namespace='ecommerce-app-ns', deployment='ecommerce-app-backend-deployment'}",
              "legendFormat": "Backend Desired Replicas",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "keda_scaler_metrics_value{scaledObject='order-service-scaler'}",
              "legendFormat": "SQS Queue Depth",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ]
        },

        {
          "id": 8,
          "title": "📊 SQS Queue Depth Over Time",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "short", "color": { "mode": "palette-classic" }, "min": 0 }
          },
          "targets": [
            {
              "expr": "keda_scaler_metrics_value{scaledObject='order-service-scaler'}",
              "legendFormat": "Messages in Queue",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "keda_scaler_active{scaledObject='order-service-scaler'}",
              "legendFormat": "Scaler Active (1=yes 0=no)",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ]
        },

        {
          "id": 9,
          "title": "💻 CPU Usage per Pod",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "color": { "mode": "palette-classic" }, "min": 0 }
          },
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='ecommerce-app-ns', container!='', container!='POD'}[2m])) by (pod)",
            "legendFormat": "{{ pod }}",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 10,
          "title": "🧠 Memory Usage per Pod",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "palette-classic" }, "min": 0 }
          },
          "targets": [{
            "expr": "sum(container_memory_working_set_bytes{namespace='ecommerce-app-ns', container!='', container!='POD'}) by (pod)",
            "legendFormat": "{{ pod }}",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 11,
          "title": "🚀 Pod Restarts (Crash Detection)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 6 },
          "fieldConfig": {
            "defaults": { "unit": "short", "min": 0, "color": { "mode": "palette-classic" } }
          },
          "targets": [{
            "expr": "increase(kube_pod_container_status_restarts_total{namespace='ecommerce-app-ns'}[15m])",
            "legendFormat": "{{ pod }} / {{ container }}",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 12,
          "title": "⚖️ Node CPU vs Memory Pressure",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 6 },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1 }
          },
          "targets": [
            {
              "expr": "1 - avg(rate(node_cpu_seconds_total{mode='idle'}[2m]))",
              "legendFormat": "CPU Used %",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)",
              "legendFormat": "Memory Used %",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ]
        },

        {
          "id": 13,
          "title": "🗄️ MongoDB Status",
          "type": "stat",
          "gridPos": { "x": 0, "y": 26, "w": 6, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{"color":"red","value":0},{"color":"green","value":1}] },
              "mappings": [{"type":"value","options":{"1":{"text":"Running","color":"green"},"0":{"text":"Down","color":"red"}}}]
            }
          },
          "targets": [{
            "expr": "kube_pod_status_phase{namespace='ecommerce-app-ns', phase='Running', pod=~'ecommerce-app-database.*'}",
            "legendFormat": "MongoDB",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 14,
          "title": "🖥️ Frontend Status",
          "type": "stat",
          "gridPos": { "x": 6, "y": 26, "w": 6, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{"color":"red","value":0},{"color":"green","value":1}] },
              "mappings": [{"type":"value","options":{"1":{"text":"Running","color":"green"},"0":{"text":"Down","color":"red"}}}]
            }
          },
          "targets": [{
            "expr": "kube_pod_status_phase{namespace='ecommerce-app-ns', phase='Running', pod=~'ecommerce-app-frontend.*'}",
            "legendFormat": "Frontend",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 15,
          "title": "⚙️ Backend Status",
          "type": "stat",
          "gridPos": { "x": 12, "y": 26, "w": 6, "h": 4 },
          "options": { "colorMode": "background", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": {
            "defaults": {
              "thresholds": { "steps": [{"color":"orange","value":0},{"color":"green","value":1}] },
              "mappings": [{"type":"value","options":{"1":{"text":"Running","color":"green"},"0":{"text":"Scaled to 0","color":"orange"}}}]
            }
          },
          "targets": [{
            "expr": "kube_pod_status_phase{namespace='ecommerce-app-ns', phase='Running', pod=~'ecommerce-app-backend.*'}",
            "legendFormat": "Backend",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 16,
          "title": "🌩️ ArgoCD Last Sync",
          "type": "stat",
          "gridPos": { "x": 18, "y": 26, "w": 6, "h": 4 },
          "options": { "colorMode": "none", "graphMode": "none", "textMode": "auto" },
          "fieldConfig": { "defaults": { "unit": "dateTimeAsIso" } },
          "targets": [{
            "expr": "argocd_app_info{name='ecommerce-store-gitops'}",
            "legendFormat": "{{ health_status }} / {{ sync_status }}",
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        },

        {
          "id": 17,
          "title": "📋 All Pods — Live Status Table",
          "type": "table",
          "gridPos": { "x": 0, "y": 30, "w": 24, "h": 8 },
          "options": { "showHeader": true, "sortBy": [{"displayName": "pod", "desc": false}] },
          "fieldConfig": {
            "defaults": { "custom": { "align": "auto" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "mappings", "value": [{"type":"value","options":{"1":{"text":"✅ Running","color":"green"},"0":{"text":"❌ Not Running","color":"red"}}}] },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              }
            ]
          },
          "transformations": [
            { "id": "labelsToFields", "options": { "valueLabel": "pod" } },
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true, "job": true, "instance": true, "uid": true } } }
          ],
          "targets": [{
            "expr": "kube_pod_status_phase{namespace='ecommerce-app-ns', phase='Running'}",
            "legendFormat": "{{ pod }}",
            "instant": true,
            "datasource": { "type": "prometheus", "uid": "prometheus" }
          }]
        }
      ]
    }