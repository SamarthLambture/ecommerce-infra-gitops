# # servicemonitor.yml
# # Drop this file in your k8s-manifest/ folder in Git.
# # ArgoCD will apply it automatically alongside deployment.yml.
# #
# # This tells Prometheus: "go scrape port 5000 on any pod
# # in ecommerce-app-ns that has the label app=ecommerce-app-backend"

# apiVersion: monitoring.coreos.com/v1
# kind: ServiceMonitor
# metadata:
#   name: ecommerce-backend-monitor
#   namespace: ecommerce-app-ns          # Same namespace as your app
#   labels:
#     release: prometheus                 # Must match the Helm release name so Prometheus picks it up
# spec:
#   selector:
#     matchLabels:
#       app: ecommerce-app-backend        # Matches your backend Service label
#   endpoints:
#     - port: "5000"                      # Must match the port name/number in ecommerce-app-backend-service
#       path: /metrics                    # Your backend must expose this endpoint (see note below)
#       interval: 15s
#   namespaceSelector:
#     matchNames:
#       - ecommerce-app-ns